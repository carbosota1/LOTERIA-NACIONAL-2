name: LN System

on:
  schedule:
    - cron: "0 17 * * *"   # 1PM RD -> PICKS
    - cron: "0 19 * * *"   # 3PM RD -> CHECK
    - cron: "0 20 * * *"   # 4PM RD -> PICKS
    - cron: "0 2 * * *"    # 10PM RD -> SYNC (02:00 UTC)
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode: picks | check | sync"
        required: true
        default: "picks"
      slot:
        description: "Slot label: 13:00 | 15:00 | 16:00 | 22:00 | manual"
        required: true
        default: "manual"
      date:
        description: "Optional date YYYY-MM-DD (leave empty for today RD)"
        required: false
        default: ""

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Decide job
        id: decide
        shell: bash
        run: |
          S="${{ github.event.schedule }}"
          echo "schedule=$S"

          if [ -n "$S" ]; then
            if [ "$S" = "0 17 * * *" ]; then
              echo "mode=picks" >> $GITHUB_OUTPUT
              echo "slot=13:00" >> $GITHUB_OUTPUT
              echo "date=" >> $GITHUB_OUTPUT
            elif [ "$S" = "0 19 * * *" ]; then
              echo "mode=check" >> $GITHUB_OUTPUT
              echo "slot=15:00" >> $GITHUB_OUTPUT
              echo "date=" >> $GITHUB_OUTPUT
            elif [ "$S" = "0 20 * * *" ]; then
              echo "mode=picks" >> $GITHUB_OUTPUT
              echo "slot=16:00" >> $GITHUB_OUTPUT
              echo "date=" >> $GITHUB_OUTPUT
            elif [ "$S" = "0 2 * * *" ]; then
              echo "mode=sync" >> $GITHUB_OUTPUT
              echo "slot=22:00" >> $GITHUB_OUTPUT
              echo "date=" >> $GITHUB_OUTPUT
            else
              echo "mode=sync" >> $GITHUB_OUTPUT
              echo "slot=manual" >> $GITHUB_OUTPUT
              echo "date=" >> $GITHUB_OUTPUT
            fi
          else
            # Manual run (workflow_dispatch): use inputs
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
            echo "slot=${{ inputs.slot }}" >> $GITHUB_OUTPUT
            echo "date=${{ inputs.date }}" >> $GITHUB_OUTPUT
          fi

      - name: Run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python src/runner.py --mode "${{ steps.decide.outputs.mode }}" --slot "${{ steps.decide.outputs.slot }}" --date "${{ steps.decide.outputs.date }}"

      - name: Commit updates (history + logs)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/*.xlsx data/*.csv || true
          git commit -m "LN update (history/logs)" || echo "No changes"
          git push
